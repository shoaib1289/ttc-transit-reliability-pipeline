version: 2

models:
  - name: fct_stop_performance
    description: "One row per detected bus arrival at a stop, with scheduled vs actual time and computed delay. Route 102."
    columns:
      - name: trip_stop_id
        description: "Unique key: vehicle + stop + arrival timestamp."
        tests:
          - not_null
          - unique
      - name: stop_name
        tests:
          - not_null
      - name: delay_minutes
        description: "Actual minus scheduled, in minutes. Positive = late."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -30
                max_value: 30

  - name: fct_route_reliability
    description: "Per-stop, per-direction reliability metrics for route 102."
    columns:
      - name: on_time_pct
        description: "Percent of arrivals within -1 to +5 min of schedule."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100